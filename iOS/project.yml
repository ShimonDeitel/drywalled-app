name: Drywalled
options:
  bundleIdPrefix: com.shimondeitel.drywalled
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Drywalled:
    type: application
    platform: iOS
    sources:
      - path: Drywalled
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.drywalled
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Drywalled/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DrywalledTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DrywalledTests
      - path: Drywalled.storekit
    dependencies:
      - target: Drywalled
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.drywalled.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DrywalledUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DrywalledUITests
    dependencies:
      - target: Drywalled
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.drywalled.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Drywalled:
    build:
      targets:
        Drywalled: all
        DrywalledTests: [test]
        DrywalledUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Drywalled.storekit
    test:
      config: Debug
      storeKitConfiguration: Drywalled.storekit
      targets:
        - DrywalledTests
        - DrywalledUITests
    archive:
      config: Release
